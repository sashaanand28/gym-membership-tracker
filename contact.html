<!DOCTYPE html>
<html>
<head>
    <title>Contact - Pulse Fitness</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #fff0f5; padding-top: 80px; color: #333; }
        .navbar { background: #ffb6c1; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 100%; z-index: 1000; box-sizing: border-box; }
        .navbar strong { color: white; font-size: 20px; }
        .nav-links a { color: white; text-decoration: none; margin-left: 20px; font-weight: bold; }
        .container { max-width: 700px; margin: 40px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 0 12px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #ff69b4; }
        .info { text-align: center; margin-bottom: 30px; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 8px; }
        button { margin-top: 20px; width: 100%; padding: 12px; background: #ff69b4; color: white; border: none; font-size: 16px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        footer { text-align: center; padding: 20px; background: #ffb6c1; color: white; margin-top: 40px; }
    </style>
</head>
<body>

<div class="navbar">
    <div><strong>Pulse Fitness</strong></div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="plans.html">Plans</a>
        <a href="join.html">Join</a>
        <a href="goals.html">Goals</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="contact.html">Contact</a>
    </div>
</div>

<div class="container">
    <h1>Contact Us</h1>

    <div class="info">
        <p><strong>Address:</strong> 123 Fitness Ave, Camden, NJ</p>
        <p><strong>Email:</strong> info@pulsefitness.com</p>
        <p><strong>Phone:</strong> (123) 456-7890</p>
    </div>

    <form>
        <label>Full Name</label>
        <input type="text" placeholder="Enter your name" required>

        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>

        <label>Message</label>
        <textarea rows="5" placeholder="Enter your message" required></textarea>

        <button type="submit">Send Message</button>
    </form>
</div>

<footer>
    <p>2026 Pulse Fitness | All Rights Reserved</p>
</footer>

</body>
</html>
